    <script>
        // ── NAVBAR ──
        const hamburguesa = document.querySelector('.hamburguesa');
        const menu = document.querySelector('.menu');
        const fechaBtn = document.querySelector('.menu > li > a');
        const submenu = document.querySelector('.submenu');

        hamburguesa.addEventListener('click', () => menu.classList.toggle('abierto'));
        fechaBtn.addEventListener('click', (e) => {
            e.preventDefault();
            submenu.classList.toggle('abierto');
        });
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.navbar')) {
                menu.classList.remove('abierto');
                submenu.classList.remove('abierto');
            }
        });

        // ── MÚSICA ──
        const bgMusic = document.getElementById('bg-music');
        const videos = document.querySelectorAll('video');

        videos.forEach(video => {
            video.addEventListener('play', () => {
                bgMusic.volume = 0.1;
            });
            video.addEventListener('pause', () => {
                const algunReproduciendo = [...videos].some(v => !v.paused);
                if (!algunReproduciendo) bgMusic.volume = 1;
            });
            video.addEventListener('ended', () => {
                const algunReproduciendo = [...videos].some(v => !v.paused);
                if (!algunReproduciendo) bgMusic.volume = 1;
            });
        });

        function toggleMusica() {
            const btn = document.getElementById('btn-play');
            if (bgMusic.paused) {
                bgMusic.play();
                btn.textContent = '⏸ Pausar música';
            } else {
                bgMusic.pause();
                btn.textContent = '▶ Reproducir música';
            }
        }
    </script>
