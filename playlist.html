<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/css/playlist-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Marck+Script&display=swap" rel="stylesheet">
    <title>Nuestra Playlist 💜</title>
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="index.html" class="btn-regresar">← Volver al Inicio</a>
        </nav>
    </header>

    <main class="contenedor-playlist">
        <h1 class="titulo-playlist">Para Cami ✨</h1>
        <p class="dedicatoria">Canciones que me recuerdan a ti...</p>

        <div class="reproductor-card">
            <iframe style="border-radius:12px" 
                src="https://open.spotify.com/embed/playlist/0uvd69uBvmx6lw9YiHTc3O?utm_source=generator"
                width="100%" 
                height="450" 
                frameBorder="0" 
                allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
            </iframe>
        </div>

        <div class="frase-final">
            <p>"Te quierooo"</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script>
        // Efecto sutil de confetti al entrar
        window.onload = () => {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#d4b0ff', '#9b4dca', '#fff']
            });
        };
    </script>
</body>
</html>
